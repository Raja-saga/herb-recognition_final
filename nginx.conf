# =============================================================================
# Herb Recognition System - Nginx Configuration
# Server: 31.97.239.242
#
# Port Map:
#   :80          → Nginx (this file)
#   :5000        → Express backend (Node.js)
#   :8000        → RAG service (FastAPI/uvicorn)
#   ML service   → No HTTP port, called internally by Express via child_process
#
# URL Routing:
#   /            → React frontend (static build)
#   /api/        → Express backend (:5000)
#   /rag/        → RAG FastAPI service (:8000)
#   /health      → Quick health check (returns 200)
# =============================================================================

# Upstream definitions — makes proxy_pass clean and allows easy port changes
upstream herb_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

upstream herb_rag {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name 31.97.239.242;

    # -------------------------------------------------------------------------
    # Global limits
    # -------------------------------------------------------------------------
    client_max_body_size 25M;       # allow image uploads up to 25MB
    client_body_timeout  60s;
    send_timeout         60s;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/herb-access.log;
    error_log  /var/log/nginx/herb-error.log warn;

    # -------------------------------------------------------------------------
    # Gzip compression for API JSON responses and frontend assets
    # -------------------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # -------------------------------------------------------------------------
    # Quick health check endpoint (no backend needed)
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # -------------------------------------------------------------------------
    # Backend API  →  Express on :5000
    #
    # Handles:
    #   POST /api/predict        - image upload + ViT ML prediction
    #   GET  /api/locations/:herb - herb geo data
    #   GET  /api/state-map/:herb - state map data
    #   POST /api/chat           - chatbot (proxies to RAG internally)
    #   POST /api/ask            - Q&A (proxies to RAG internally)
    #   GET  /api/test-locations - debug endpoint
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://herb_backend;
        proxy_http_version 1.1;

        proxy_set_header Connection       "";           # required for keepalive
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin           $http_origin; # pass origin so Express CORS works

        # Timeouts — ML inference (ViT) can take 20-60s on CPU
        proxy_connect_timeout  10s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;

        # Buffer settings for large image upload responses
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           8 32k;
        proxy_busy_buffers_size 64k;
    }

    # -------------------------------------------------------------------------
    # RAG Service  →  FastAPI on :8000
    #
    # Handles:
    #   GET  /rag/health  - RAG health check
    #   POST /rag/ask     - direct RAG Q&A (bypasses Express)
    #   POST /rag/query   - direct RAG query (bypasses Express)
    #
    # Note: Frontend normally goes through /api/chat → Express → RAG internally.
    # This /rag/ block is for direct access or debugging only.
    # -------------------------------------------------------------------------
    location /rag/ {
        proxy_pass http://herb_rag/;   # trailing slash strips /rag prefix
        proxy_http_version 1.1;

        proxy_set_header Connection       "";
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header Origin           $http_origin;

        # RAG + LLM calls can be slow (OpenRouter latency)
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # -------------------------------------------------------------------------
    # Frontend  →  React static build
    #
    # Serves the Vite production build from /frontend/dist
    # try_files handles client-side routing (React Router)
    # -------------------------------------------------------------------------
    location / {
        root /var/www/herb-recognition/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets (JS/CSS/images) for 7 days
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}