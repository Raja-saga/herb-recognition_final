
# =============================================================================
# Herb Recognition System - Final Nginx Configuration
# =============================================================================

# ---------------------------
# Upstreams (clean proxying)
# ---------------------------
upstream herb_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

upstream herb_rag {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name 31.97.239.242;

    # ---------------------------
    # Global settings
    # ---------------------------
    client_max_body_size 25M;   # image upload limit
    client_body_timeout  60s;
    send_timeout         60s;

    access_log /var/log/nginx/herb-access.log;
    error_log  /var/log/nginx/herb-error.log warn;

    # ---------------------------
    # Gzip (performance)
    # ---------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # ---------------------------
    # Health check
    # ---------------------------
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ---------------------------
    # BACKEND (Node.js)
    # ---------------------------
    location /api/ {
        proxy_pass http://herb_backend;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;

        # timeouts (ML takes time)
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # buffers for image upload responses
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }

    # ---------------------------
    # RAG (FastAPI)
    # ---------------------------
    location /rag/ {
        proxy_pass http://herb_rag/;   # strips /rag prefix
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Origin $http_origin;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ---------------------------
    # FRONTEND (React build)
    # ---------------------------
    location / {
        root /var/www/herb-recognition/frontend/dist;
        index index.html;

        try_files $uri $uri/ /index.html;

        # Static caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}